(() =&gt; {
  const root = document.getElementById(&quot;law-case-mosaic-019f6f95&quot;);
  if (!root) return;

责任纠纷。法院认定，上诉人祁小红在个人微博中使用“野鸡”等侮辱性词语指称上诉人范冰冰，在一定程度上降低了范冰冰的社会评价、损害了范冰冰的名誉，一审法院认定祁小红的行为构成侵权并无不当，祁小红上诉主张的相关微博对祁小红进行辱骂、攻击的行为并不足以成为祁小红进行案涉侵权行为的免责理由，对此辩解意见本院不予采纳。2022年3月21日，案件在北京市经二审审结：二审驳回上诉、维持原判。&quot;},{&quot;id&quot;:4,&quot;caseName&quot;:&quot;沈宥均与耿康等网络侵权责任纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;北京市&quot;,&quot;date&quot;:&quot;2022-03-07&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;隐私权、个人信息保护纠纷&quot;,&quot;purpose&quot;:&quot;个人恩怨报复&quot;,&quot;method&quot;:&quot;虚假新闻传播、人身攻击和侮辱、隐私侵犯、舆论操纵与煽动&quot;,&quot;format&quot;:&quot;文字、图片&quot;,&quot;platform&quot;:&quot;豆瓣&quot;,&quot;visibility&quot;:&quot;半公开&quot;,&quot;relation&quot;:&quot;熟人关系&quot;,&quot;story&quot;:&quot;豆瓣上的一组图文，把熟人之间的争议带进法庭。“沈宥均与耿康等”案由此成为一起隐私权、个人信息保护纠纷。法院认定，被告耿康作为发布者，在收到在被告施丽萍的投稿时，未进行核实，就在豆瓣网上公开发布了缺乏依据的帖子，对于明显图文不符的言论并未尽到相应的审慎义务，故耿康与施丽萍构成共同侵权。2022年3月7日，案件在北京市经一审审结：被告耿康和被告施丽萍使用被告耿康的豆瓣账号刊登致歉声明，向原告沈宥均赔礼道歉；被告耿康、被告施丽萍共同赔偿原告沈宥均精神损失费10000元、公证费1200元、律师费10000元。&quot;},{&quot;id&quot;:5,&quot;caseName&quot;:&quot;高喜良、高林强等名誉权纠纷民事一审民事判决书&quot;,&quot;province&quot;:&quot;河南省&quot;,&quot;date&quot;:&quot;2022-03-04&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;个人恩怨报复&quot;,&quot;method&quot;:&quot;虚假新闻传播、人身攻击和侮辱、隐私侵犯&quot;,&quot;format&quot;:&quot;文字、视频&quot;,&quot;platform&quot;:&quot;微博、抖音&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;邻里/村民关系&quot;,&quot;story&quot;:&quot;一次发生在邻里或村民之间的网络冲突，因微博、抖音上的一组图文和视频进入司法程序，这就是“高喜良、高林强等民事”案。法院认定，被告高林强、李会霞与原告高喜良因存在矛盾，未采取合法适当方法进行解决，在网络上发布包含有“贪污、村霸”的文字和高喜良犯罪信息的视频、文字，二被告行为对原告名誉造成了一定贬损，已侵害了原告的名誉权，原告要求二被告停止侵害、赔礼道歉，于法有据，结合被告侵权行为的时间及影响范围，本院依法确定被告应向原告书面赔礼道歉，致歉内容需经本院审查。2022年3月4日，案件在河南省经一审审结：被告高林强、李会霞删除在李会霞的“微博”和抖音号“ｌｉ1186102997”中发布的与原告高喜良有关的视频、文字；被告高林强、李会霞向原告高喜良书面赔礼道歉。&quot;},{&quot;id&quot;:6,&quot;caseName&quot;:&quot;苏国志与何涛名誉权纠纷民事二审案件民事判决书&quot;,&quot;province&quot;:&quot;上海市&quot;,&quot;date&quot;:&quot;2022-02-15&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot ion&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;一次发生在陌生人之间的网络冲突，因微博上的一则文字内容进入司法程序，这就是“朱㤎等”案。法院认定，案涉微博内容中含有大量侮辱性用语，构成对李媛媛人格权的侵犯，一审认定侵权成立并无不当，朱?辩称案涉微博内容系他人使用其微博账号所发布，不仅缺乏事实依据，且其陈述前后矛盾，难以令人信服，因此，对于朱?的上诉请求本院不予支持。2020年9月8日，案件在北京市经二审审结：二审驳回上诉、维持原判。&quot;},{&quot;id&quot;:51,&quot;caseName&quot;:&quot;黄沁懿与廖志强名誉权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;四川省&quot;,&quot;date&quot;:&quot;2020-09-07&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;情绪宣泄与心理满足&quot;,&quot;method&quot;:&quot;人身攻击和侮辱、持续的骚扰与重复攻击&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;微博&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;从微博上的一则文字内容到法庭，“黄沁懿与廖志强”案让陌生人之间的冲突演变为名誉权纠纷。法院认定，新浪微博账号“大即是正义Gasp”为廖志强所用，根据所有证据，廖志强曾经发布的多条微博里使用“墩子”、“坦克”、“装逼”等粗俗的语言对黄沁懿进行侮辱，且浏览量达到20余万次，应认定达到足以降低原告社会评价的程度，该行为构成对黄沁懿名誉权的侵害，因此廖志强应当承担相应的侵权责任。2020年9月7日，案件在四川省经一审审结：被告（反诉原告）廖志强自判决生效之日起，连续十天（每天二十四小时）在其日常使用的新浪微博账号“大即是正义Gasp”首页置顶位置公开刊登致歉声明，向原告（反诉被告）黄沁懿赔礼道歉。&quot;},{&quot;id&quot;:52,&quot;caseName&quot;:&quot;林礼国,杨少兵与名誉权纠纷二审民事判决书&quot;,&quot;province&quot;:&quot;广东省&quot;,&quot;date&quot;:&quot;2020-09-03&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;侵权责任纠纷&quot;,&quot;purpose&quot;:&quot;个人/群体恩怨报复&quot;,&quot;method&quot;:&quot;人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;微博&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;微博上的一则文字内容，把陌生人之间的争议带进法庭。“林礼国,杨少兵与”案由此成为一起侵权责任纠纷。法院认定，根据一般生活常识即可判断，杨少兵在其微博发布的《博文历险记》、《掀起你的遮羞布，让我来看看你的脸》、《我为什么说毒狼在造谣引骂》、《林礼国，告诉你几句悄悄话》以及转发网民“到处乱逛06”2018年8月26日发布的内容中，使用侮辱方式损害林礼国名誉，且会造成一定影响。2020年9月3日，案件在广东省经二审审结：二审驳回上诉、维持原判。&quot;},{&quot;id&quot;:53,&quot;caseName&quot;:&quot;张鹤尹与刘岸辉、北京微梦创科网络技术有限公司名誉权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;四川省&quot;,&quot;date&quot;:&quot;2020-08-27&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;情绪宣泄与心理满足&quot;,&quot;method&quot;:&quot;人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;微博&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;一次发生在陌生人之间的网络冲突，因微博上的一则文字内容进入司法程序，这就是“张鹤尹与刘岸辉、北京微梦创科网络技术有限公司”案。法院认定，张鹤尹能够证明微博上存在对其进行辱骂的行为，但未能举示相关证据证明昵称为“十一满崽”“鸿爷请吃椰汁鸡”“左贺超级阿姆”的微博账户使用人为刘岸辉，故本院对张鹤尹要求刘岸辉承担侵权责任不予支持。2020年8月27日，案件在四川省经一审审结：驳回原告张鹤尹全部诉讼请求。&quot;},{&quot;id&quot;:54,&quot;caseName&quot;:&quot;张蕾与王荣花名誉权纠纷二审民事判决书&quot;,&quot;province&quot;:&quot;山东省&quot;,&quot;date&quot;:&quot;2020-08-27&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;情绪宣泄与心理满足&quot;,&quot;method&quot;:&quot;舆论操纵与煽动&quot;,&quot;format&quot;:&quot;视频、文字&quot;,&quot;platform&quot;:&quot;微信&quot;,&quot;visibility&quot;:&quot;半公开&quot;,&quot;relation&quot;:&quot;消费者与商家&quot;,&quot;story&quot;:&quot;从微信上的一组图文和视频到法庭，“张蕾与王荣花”案让消费者与商家之间的冲突演变为名誉权纠纷。法院认定，因此，对轻微的言行不当，应提倡为当事者保留相应的自治时间和自治空间，促使矛盾双方自力化解纠纷，不应动辄将双方矛盾在网上传播，增加违法风险和纠纷化解成本。2020年8月27日，案件在山东省经二审审结：撤销山东省济南市莱芜区人民法院（2020）鲁0116民初72号民事判决；王荣花向张蕾书面赔礼道歉。&quot;},{&quot;id&quot;:55,&quot;caseName&quot;:&quot;杨晓艳与冯天吻、于洪萍名誉权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;辽宁省&quot;,&quot;date&quot;:&quot;2020-08-25&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;情绪宣泄与心理满足&quot;,&quot;method&quot;:&quot;舆论操纵与煽动&quot;,&quot;format&quot;:&quot;图片、文字&quot;,&quot;platform&quot;:&quot;快手&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;熟人关系&quot;,&quot;story&quot;:&quot;快手上的一组图文，把熟人之间的争议带进法庭。“杨晓艳与冯天吻、于洪萍”案由此成为一起名誉权纠纷。法院认定，在原告单位组织调解情况下，仍然没有停止播放，二被告主观具有过错，可以认定被告的发贴行为构成对原告名誉侵权。2020年8月25日，案件在辽宁省经一审审结：被告冯天吻、于洪萍在快手及火山小视频上刊登向原告杨晓艳公开赔礼道歉。&quot;},{&quot;id&quot;:56,&quot;caseName&quot;:&quot;张珂玄与张博瑀等网络侵权责任纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;北京市&quot;,&quot;date&quot;:&quot;2020-08-21&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;网络侵权责任纠纷& ;:&quot;快手上的一组图文，把陌生人之间的争议带进法庭。“刘丽莉与北京快手科技有限公司”案由此成为一起网络侵权责任纠纷。法院认定，本案的侵权事实是快手平台昵称“一村大郎”的用户，擅自使用刘丽莉肖像用作其头像和背景，使用与刘丽莉在快手平台相似昵称，与其自我介绍内容配合，构成对刘丽莉的贬损、诽谤。2020年5月28日，案件在北京市经二审审结：二审驳回上诉、维持原判。&quot;},{&quot;id&quot;:68,&quot;caseName&quot;:&quot;莫雨健与北京微梦创科网络技术有限公司名誉权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;北京市&quot;,&quot;date&quot;:&quot;2020-05-21&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;个人/群体恩怨报复&quot;,&quot;method&quot;:&quot;人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;微博&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;熟人关系&quot;,&quot;story&quot;:&quot;一次发生在熟人之间的网络冲突，因微博上的一则文字内容进入司法程序，这就是“莫雨健与北京微梦创科网络技术有限公司”案。法院认定，夏苏琳在其微博中为宣泄因与莫雨健恋爱不成的郁闷和愤怒情绪，刻意在其微博中对莫雨健使用具有人身攻击、侮辱性的词语进行贬损，其主观恶意强烈，虽夏苏琳在微博中亦承认系因与莫雨健恋爱不成，因爱成恨，但其选择在网络上宣泄其情绪，使双方的事情扩大到了公众场合，其造成的影响亦会对莫雨健的人格造成社会评价的降低。2020年5月21日，案件在北京市经一审审结：被告夏苏琳书面向原告莫雨健赔礼道歉。&quot;},{&quot;id&quot;:69,&quot;caseName&quot;:&quot;杨琳与唐梦缘名誉权纠纷一案民事一审判决书&quot;,&quot;province&quot;:&quot;广东省&quot;,&quot;date&quot;:&quot;2020-05-06&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;个人/群体恩怨报复&quot;,&quot;method&quot;:&quot;虚假新闻传播、人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字、图片&quot;,&quot;platform&quot;:&quot;微信&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;同事/同业关系&quot;,&quot;story&quot;:&quot;从微信上的一组图文到法庭，“杨琳与唐梦缘一案民事判决书”案让同事或同业之间的冲突演变为名誉权纠纷。法院认定，关于案涉美拍平台的内容，已为本院认定系被告所发布，现对该被告的发布行为是否侵犯了原告名誉权、肖像权、隐私权进行分析。2020年5月6日，案件在广东省经一审审结：被告唐梦缘在微信朋友圈（微信号：******）以文字的形式对侵犯原告杨琳隐私权、名誉权、肖像权的事实发表澄清声明，为原告消除影响、恢复名誉；被告唐梦缘赔偿原告杨琳精神损害抚慰金1万元。&quot;},{&quot;id&quot;:70,&quot;caseName&quot;:&quot;熊达与北京日报报业集团（北京日报社）名誉权纠纷二审民事判决书&quot;,&quot;province&quot;:&quot;北京市&quot;,&quot;date&quot;:&quot;2020-04-28&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;舆论操控与立场表达&quot;,&quot;method&quot;:&quot;舆论操纵与煽动&quot;,&quot;format&quot;:&quot;文字&qu t;:&quot;微信&quot;,&quot;visibility&quot;:&quot;半公开&quot;,&quot;relation&quot;:&quot;企业与个人（非消费类）&quot;,&quot;story&quot;:&quot;从微信上的一则文字内容到法庭，“佛冈县石角镇中飞腾地产服务中心、黄翠香等与杨杏婵”案让企业与个人（非消费类）之间的冲突演变为名誉权纠纷。法院认定，而在“佛冈鸿兴中腾地产公司”、“佛冈地产中介精英会”、“房汇网熹乐谷报备大群”等微信群中发布杨杏婵实施了“飞单”行为的言论，属于捏造事实，使杨杏婵个人的人品、人格及职业操守等受到众人怀疑，亦遭到了同行的排斥，降低了社会公众对其的评价，贬损了杨杏婵的名誉，已构成对被告杨杏婵名誉权的侵犯。2019年10月14日，案件在广东省经一审审结：限被告杨杏婵在其“城北私房菜”、“谭志朋广州专线群”微信群及朋友圈范围内向原告佛冈县石角镇中飞腾地产服务中心、黄翠香公开赔礼道歉。&quot;},{&quot;id&quot;:85,&quot;caseName&quot;:&quot;龙志松与杨树新名誉权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;广东省&quot;,&quot;date&quot;:&quot;2019-09-30&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;个人恩怨报复&quot;,&quot;method&quot;:&quot;人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;微信&quot;,&quot;visibility&quot;:&quot;半公开&quot;,&quot;relation&quot;:&quot;同事/同业关系&quot;,&quot;story&quot;:&quot;微信上的一则文字内容，把同事或同业之间的争议带进法庭。“龙志松与杨树新”案由此成为一起名誉权纠纷。法院认定，被告杨树新在其微信朋友圈以及“美协会员231”、以及“鉴水书画（95）”微信群上发表“‘领导’身为人民公仆，为了打赢这场官司，要一个退休工人赔偿三万元精神损失费，无所不用其极，在法庭呈假证，手段甚为悲鄙恶劣！。2019年9月30日，案件在广东省经一审审结：限被告杨树新以书面方式向原告龙志松赔礼道歉。&quot;},{&quot;id&quot;:86,&quot;caseName&quot;:&quot;刘诗施与黄泽军网络侵权责任纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;北京市&quot;,&quot;date&quot;:&quot;2019-08-28&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;网络侵权责任纠纷&quot;,&quot;purpose&quot;:&quot;流量与关注度追逐&quot;,&quot;method&quot;:&quot;人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;微博&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;一次发生在陌生人之间的网络冲突，因微博上的一则文字内容进入司法程序，这就是“刘诗施与黄泽军”案。法院认定，被告在原告已经就该事件委托律师发布声明后，仍在凤凰网中发布该不实信息，文章虽称是卓伟爆料，但被告不经核实信息的真实性径行发布，并以“出轨、怀孕”等博人眼球的字眼作为文章标题，可以认定被告主观上存在过错，被告的言论确对原告构成诽谤。2019年8月28日，案件在北京市经一审审结：被告黄泽军在《人民法院报》上发表赔礼道歉；被告黄泽军赔偿原告刘诗施精神损害抚慰金30000元、公证费及律师费10000元，合计40000元。&quot;},{&quot;id&quot;:87,&quot;caseName&quot;:&quot;段新陆、段明名誉权纠纷二审民事判决书&quot;,&quot;province&quot;:&quot;湖南省&quot;,&quot;date&quot;:&quot;2019-08-14&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;个人恩怨报复&quot;,&quot;method&quot;:&quot;隐私侵犯、人身攻击和侮辱&quot;,&quot;format&quot;:&quot;视频&quot;,&quot;platform&quot;:&quot;微信&quot;,&quot;visibility&quot;:&quot;半公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;从微信上的一段视频到法庭，“段新陆、段明”案让陌生人之间的冲突演变为名誉权纠纷。法院认定，但由于微信朋友圈是限于特定人群之间的私密性质的社交平台，段明的该行为并未对段新陆的名誉造成较严重的损害，且段新陆也未能提供足够充分的证据证明其名誉受到较严重的损害，故段新陆认为本案中段明的行为侵犯了其名誉权的上诉主张不能成立。2019年8月14日，案件在湖南省经二审审结：二审驳回上诉、维持原判。&quot;},{&quot;id&quot;:88,&quot;caseName&quot;:&quot;于益如、辛朝一般人格权纠纷二审民事判决书&quot;,&quot;province&quot;:&quot;广东省&quot;,&quot;date&quot;:&quot;2019-08-12&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;人格权纠纷&quot;,&quot;purpose&quot;:&quot;个人恩怨报复&quot;,&quot;method&quot;:&quot;人身攻击和侮辱&quot;,&quot;format&quot;:&quot;视频&quot;,&quot;platform&quot;:&quot;微信、微博、抖音&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;未明确&quot;,&quot;story&quot;:&quot;微信、微博、抖音上的一段视频，把当事人之间的争议带进法庭。“于益如、辛朝一般”案由此成为一起人格权纠纷。法院认定，于益如上诉要求辛朝在微博、微信朋友圈、抖音等平台赔礼道歉，并将该道歉声明在新浪微博置顶发布持续三个月、向其赔偿精神损害抚慰金130000元，由于于益如未能提交充足证据证明因辛朝侵权导致严重后果，且一审法院判令辛朝通过微博向其赔礼道歉的方式足以消除影响、恢复其名誉，于益如该主张并无事实及法律依据，本院不予采纳。2019年8月12日，案件在广东省经二审审结：二审驳回上诉、维持原判。&quot;},{&quot;id&quot;:89,&quot;caseName&quot;:&quot;䎋笑、李群、杭州市西湖区人民政府等行政复议二审行政判决书&quot;,&quot;province&quot;:&quot;浙江省&quot;,&quot;date&quot;:&quot;2019-07-26&quot;,&quot;caseType&quot;:&quot;行政&quot;,&quot;cause&quot;:&quot;行政复议&quot;,&quot;purpose&quot;:&quot;个人恩怨报复&quot;,&quot;method&quot;:&quot;隐私侵犯&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;微信&quot;,&quot;visibility&quot;:&quot;半公开&quot;,&quot;relation&quot;:&quot;邻里关系&quot;,&quot;story&quot;:&quot;一次发生在邻里之间的网络冲突，因微信上的一则文字内容进入司法程序，这就是“䎋笑、李群、杭州市西湖区人民政府等行政复议”案。法院认定，上诉人王笑、李群及被上诉人王筱敏均系杭州西溪诚园业主，王筱敏因其与两上诉人之间的纠纷在西溪诚园业主微信群中发布了“一件发生在明礼苑的恶性事件”的文章，从自己的角度描述了事情经过，表达了看法，并公开了上诉人王笑、李群的姓名和家庭具体住址。2019年7月26日，案件在浙江省经二审审结：二审驳回上诉、维持原判。&quot;},{&quot;id&quot;:90,&quot;caseName&quot;:&quot;马晓蓓与田惠芳名誉权纠纷二审民事判决书&quot;,&quot;province&quot;:&quot;山东省&quot;,&quot;date&quot;:&quot;2019-07-12&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;个人恩怨报复&quot;,&quot;method&quot;:&quot;人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;微信&quot;,&quot;visibility&quot;:&quot;半公开&quot;,&quot;relation&quot;:&quot;企业与个人（消费类）&quot;,&quot;story&quot;:&quot;从微信上的一则文字内容到法庭，“马晓蓓与田惠芳”案让企业与个人（消费类）之间的冲突演变为名誉权纠纷。法院认定，马某某的不当行为已构成名誉侵权，一审判决予以认定具有事实依据，一审判决判令马某某其在微信朋友圈中公开赔礼道歉，所做处理并无不当。2019年7月12日，案件在山东省经二审审结：二审驳回上诉、维持原判。&quot;},{&quot;id&quot;:91,&quot;caseName&quot;:&quot;闫锡全与北京百度网讯科技有限公司等名誉权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;北京市&quot;,&quot;date&quot;:&quot;2019-06-26&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;个人恩怨报复&quot;,&quot;method&quot;:&quot;人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;百度、贴吧&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;熟人关系&quot;,&quot;story&quot;:&quot;百度、贴吧上的一则文字内容，把熟人之间的争议带进法庭。“闫锡全与北京百度网讯科技有限公司等”案由此成为一起名誉权纠纷。法院认定，本案根据查明事实，逯燕持续发帖属实，综合涉案文章标题，另结合贴文及后续评论所述，对原告的评价或举报已经超出合理的程度，上述言论对其构成了侵害。2019年6月26日，案件在北京市经一审审结：被告逯燕向原告闫锡全出具书面致歉声明，向原告闫锡全赔礼道歉；被告逯燕和被告北京百度网讯科技有限公司分别赔偿原告闫锡全精神损害抚慰金5000元。&quot;},{&quot;id&quot;:92,&quot;caseName&quot;:&quot;黄淑芬与岳屾山等网络侵权责任纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;北京市&quot;,&quot;date&quot;:&quot;2019-06-18&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;网络侵权责任纠纷&quot;,&quot;purpose&quot;:&quot;未明确&quot;,&quot;method&quot;:&quot;人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字、视频&quot;,&quot;platform&quot;:&quot;微博&quot;,&quot;visibility&quot;:&quot;未明确&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;一次发生在陌生人之间的网络冲突，因微博上的一组图文和视频进入司法程序，这就是“黄淑芬与岳屾山等”案。法院认定，岳屾山在提供法律咨询服务并成为代理人之后，发布的涉案博文不存在侮辱和诽谤的内容，即便按照更高的注意义务标准来判断，其发布的涉案博文仍然不构成侵权。2019年6月18日，案件在北京市经一审审结：驳回原告黄淑芬的全部诉讼请求。&quot;},{&quot;id&quot;:93,&quot;caseName&quot;:&quot;杨达艳与陈英网络侵权责任纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;浙江省&quot;,&quot;date&quot;:&quot;2019-05-24&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;网络侵权责任纠纷&quot;,&quot;purpose&quot;:&quot;个人恩怨报复&quot;,&quot;method&quot;:&quot;人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;微博&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;邻里关系&quot;,&quot;story&quot;:&quot;从微博上的一则文字内容到法庭，“杨达艳与陈英”案让邻里之间的冲突演变为网络侵权责任纠纷。法院认定，“打人者老婆（盖北闰土染布厂做化验员的羊大艳）”、“打人者老婆在盖北化工园区浙江闰土染布厂做化验员小组长的贵州人杨大燕”等信息直指原告，并通过“@狼来了MM311”回复不当言论，该行为已对原告构成侵权。2019年5月24日，案件在浙江省经一审审结：被告陈英应在108社区上虞板块首页置顶发布道歉信，向原告杨达艳赔礼道歉。&quot;},{&quot;id&quot;:94,&quot;caseName&quot;:&quot;何桂全与何镜棋、天涯社区网络科技股份有限公司名誉权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;广东省&quot;,&quot;date&quot;:&quot;2019-05-20&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;流量与关注度追逐&quot;,&quot;method&quot;:&quot;虚假新闻传播、威胁与恐吓、人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;百度&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;百度上的一则文字内容，把陌生人之间的争议带进法庭。“何桂全与何镜棋、天涯社区网络科技股份有限公司”案由此成为一起名誉权纠纷。法院认定，一、关于何镜棋发布案涉帖子是否侵害了何桂全名誉权的问题，本院作如下分析： （1）文章《谁来救救我？。2019年5月20日，案件在广东省经一审审结：判令被告何镜棋向原告何桂全出具致歉声明；原告何桂全支付维权合理费用1500元。&quot;},{&quot;id&quot;:95,&quot;caseName&quot;:&quot;刘诗施与周城宇名誉权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;北京市&quot;,&quot;date&quot;:&quot;2019-05-06&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;流量与关注度追逐&quot;,&quot;method&quot;:&quot;人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;微博&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;一次发生在陌生人之间的网络冲突，因微博上的一则文字内容进入司法程序，这就是“刘诗施与周城宇”案。法院认定，被告在原告已经就该事件委托律师发布声明后，仍在其新浪微博中发布该不实信息，文章虽称是卓伟爆料，但被告不经核实信息的真实性径行发布，并以“出轨、怀孕、孩子不是吴奇隆的”等博人眼球的字眼作为文章标题，可以认定被告主观上存在过错，被告的言论确对原告构成诽谤。2019年5月6日，案件在北京市经一审审结：被告周城宇在全国公开发行的报纸上发表赔礼道歉；被告周城宇赔偿原告刘诗施公证费1290元、精神损害抚慰金30000元、律师费10000元，合计41290元。&quot;},{&quot;id&quot;:96,&quot;caseName&quot;:&quot;来兴根与杭州企瑞物业服务有限公司、杨骏宇名誉权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;浙江省&quot;,&quot;date&quot;:&quot;2019-04-26&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;未明确&quot;,&quot;method&quot;:&quot;虚假新闻传播、人身攻击和侮辱&quot;,&quot;format&quot;:&quot;视频&quot;,&quot;platform&quot;:&quot;微信&quot;,&quot;visibility&quot;:&quot;半公开&quot;,&quot;relation&quot;:&quot;企业与个人（非消费类）&quot;,&quot;story&quot;:&quot;从微信上的一段视频到法庭，“来兴根与杭州企瑞物业服务有限公司、杨骏宇”案让企业与个人（非消费类）之间的冲突演变为名誉权纠纷。法院认定，被告杨骏宇于物业催收当天将小视频上传小区业主微信群及发布三条语音，将原告家人拒交水费和能耗费的过程在小区业主群中公开，并使用表示气愤的语气进行评价，引发其他业主进行跟骂和负面评价。2019年4月26日，案件在浙江省经一审审结：驳回原告来兴根的全部诉讼请求。&quot;},{&quot;id&quot;:97,&quot;caseName&quot;:&quot;杨某敲诈勒索罪一审刑事判决书&quot;,&quot;province&quot;:&quot;内蒙古自治区&quot;,&quot;date&quot;:&quot;2019-04-25&quot;,&quot;caseType&quot;:&quot;刑事&quot;,&quot;cause&quot;:&quot;敲诈勒索罪&quot;,&quot;purpose&quot;:&quot;经济利益诉求&quot;,&quot;method&quot;:&quot;威胁与恐吓、人身攻击和侮辱&quot;,&quot;format&quot;:&quot;图片&quot;,&quot;platform&quot;:&quot;微博&quot;,&quot;visibility&quot;:&quot;私密&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;微博上的一组图片，把陌生人之间的争议带进法庭。“杨某敲诈勒索罪”案由此成为一起敲诈勒索罪。法院认定，被告人杨某以非法占有为目的，对被害人晋某、吴某通过电话轰炸、辱骂威胁恐吓和发放被害人手持身份证和淫秽照片P成图片的方式，强行索取被害人财物，数额较大，其行为构成敲诈勒索罪。2019年4月25日，案件在内蒙古自治区经一审审结：被告人杨某犯敲诈勒索罪，判处有期徒刑一年一个月，并处罚金八千元。罚金应于判决生效之日缴纳完毕。&quot;},{&quot;id&quot;:98,&quot;caseName&quot;:&quot;陈英与杨达艳、浙江昊汉网络有限公司网络侵权责任纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;浙江省&quot;,&quot;date&quot;:&quot;2019-01-18&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;网络侵权责任纠纷&quot;,&quot;purpose&quot;:&quot;个人恩怨报复&quot;,&quot;method&quot;:&quot;人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字、视频&quot;,&quot;platform&quot;:&quot;微博&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;一次发生在陌生人之间的网络冲突，因微博上的一组图文和视频进入司法程序，这就是“陈英与杨达艳、浙江昊汉网络有限公司”案。法院认定，被告杨达艳在被告昊汉公司运营的“上虞108社区”论坛上以发帖和跟帖的方式对原告陈英进行辱骂、发表贬低原告陈英人格的不实言论，对原告陈英的人格尊严构成侵害，应依法承担停止侵害、赔礼道歉、消除影响、恢复名誉的民事责任。2019年1月18日，案件在浙江省经一审审结：被告杨达艳应在108社区上虞板块首页置顶发布道歉信（被告浙江昊汉网络有限公司予以配合），向原告陈英赔礼道歉；被告杨达艳应支付原告陈英精神损害赔偿金1000元，被告浙江昊汉网络有限公司对于该款项承担连带责任。&quot;},{&quot;id&quot;:99,&quot;caseName&quot;:&quot;杨哲与北京微梦创科网络技术有限公司等名誉权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;北京市&quot;,&quot;date&quot;:&quot;2019-01-15&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;未明确&quot;,&quot;method&quot;:&quot;舆论操纵与煽动、人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;微博&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;从微博上的一则文字内容到法庭，“杨哲与北京微梦创科网络技术有限公司等”案让陌生人之间的冲突演变为名誉权纠纷。法院认定，柳晓宇发布的涉案微博侵害了杨哲的名誉权，应该承担停止侵权、赔礼道歉、消除影响、赔偿损失的责任。2019年1月15日，案件在北京市经一审审结：被告柳晓宇在其涉案新浪微博帐号置顶位置连续二十四小时向原告杨哲赔礼道歉；被告柳晓宇赔偿原告杨哲合理开支7000元;。&quot;},{&quot;id&quot;:100,&quot;caseName&quot;:&quot;刘滢与贝联传媒（武汉）有限公司名誉权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;河南省&quot;,&quot;date&quot;:&quot;2018-12-28&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;流量与关注度追逐&quot;,&quot;method&quot;:&quot;虚假新闻传播、威胁与恐吓、人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;微信&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;微信上的一则文字内容，把陌生人之间的争议带进法庭。“刘滢与贝联传媒（武汉）有限公司”案由此成为一起名誉权纠纷。法院认定，原告在看到涉案文章后自杀，被告的侵权行为给原告造成了严重的精神损害，根据被告的过错程度、名誉影响程度和具体侵权情节，原告要求被告赔偿精神损害赔偿金10000元，本院予以支持。2018年12月28日，案件在河南省经一审审结：被告贝联传媒(武汉)有限公司以书面形式向原告刘滢赔礼道歉；被告贝联传媒(武汉)有限公司支付原告刘滢精神损害赔偿金10000元。&quot;},{&quot;id&quot;:101,&quot;caseName&quot;:&quot;缪艳桥、崔小超名誉权纠纷二审民事判决书&quot;,&quot;province&quot;:&quot;河北省&quot;,&quot;date&quot;:&quot;2018-12-13&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;经济利益诉求&quot;,&quot;method&quo se&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;经济利益诉求&quot;,&quot;method&quot;:&quot;人身攻击和侮辱、舆论操纵与煽动&quot;,&quot;format&quot;:&quot;文字、视频&quot;,&quot;platform&quot;:&quot;微信&quot;,&quot;visibility&quot;:&quot;半公开&quot;,&quot;relation&quot;:&quot;消费者与商家&quot;,&quot;story&quot;:&quot;从微信上的一组图文和视频到法庭，“朱某、赵某与罗某某、张家界某物业服务有限公司”案让消费者与商家之间的冲突演变为名誉权纠纷。法院认定，原告朱某系未成年人，被告罗某某发布视频时，也未进行技术处理，因此，被告罗某某的行为存在侵犯原告朱某名誉权的性质。2024年7月30日，案件在湖南省经一审审结：被告罗某某在“某街道某小区业主群”的微信群中连续两天发布经本院审查的道歉信向原告朱某公开赔礼道歉；被告罗某某赔偿原告朱某精神损害抚慰金1000元，履行完毕。&quot;},{&quot;id&quot;:127,&quot;caseName&quot;:&quot;杨某与王某名誉权纠纷二审判决书&quot;,&quot;province&quot;:&quot;吉林省&quot;,&quot;date&quot;:&quot;2024-06-24&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;舆论操控与立场表达&quot;,&quot;method&quot;:&quot;虚假新闻传播、舆论操纵与煽动&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;抖音&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;无明确现实关联&quot;,&quot;story&quot;:&quot;抖音上的一则文字内容，把无明确现实关联之间的争议带进法庭。“杨某与王某判决书”案由此成为一起名誉权纠纷。法院认定，杨某在抖某平台上多次发布王某“贪污”“徇私舞弊”等不实言论，播放量较大，超出合理限度，侵害了王某的名誉，致使其社会评价降低，一审判决杨某向王某赔礼道歉并赔偿5000元精神损害赔偿金及合理费用支出，具有事实及法律依据。2024年6月24日，案件在吉林省经二审审结：二审驳回上诉、维持原判。&quot;},{&quot;id&quot;:128,&quot;caseName&quot;:&quot;李ＸＸ与黄ＸＸ名誉权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;陕西省&quot;,&quot;date&quot;:&quot;2024-05-14&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;未明确&quot;,&quot;method&quot;:&quot;无&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;网络论坛、社交平台&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;网络言论/舆论引发&quot;,&quot;story&quot;:&quot;一次发生在网络言论或舆论引发之间的网络冲突，因网络论坛、社交平台上的一则文字内容进入司法程序，这就是“李ＸＸ与黄ＸＸ”案。法院认定，纵观本案各平台公司被告，均在提供网络服务时，提醒平台用户在发表时不得侵犯他人合法权利，且均提供了任何可能被侵犯权利的用户向平台公司投诉的渠道，因此应认为各平台公司被告已履行相关法律义务。2024年5月14日，案件在陕西省经一审审结：驳回原告李XX全部诉讼请求。&quot;},{&quot;id&quot;:129,&quot;caseName&quot;:&quot;金某频与白某、王某梅名誉权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;山东省&quot;,&q sibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;企业与个人（非消费类）&quot;,&quot;story&quot;:&quot;一次发生在企业与个人（非消费类）之间的网络冲突，因微博、网络论坛、QQ上的一则文字内容进入司法程序，这就是“赵芮与郑州骆马网络技术有限公司”案。法院认定，被告使用了“贪得无厌，唯利是图，恬不知耻”，“恐怖分子”等侮辱性的言辞，超过合理的言论限度，造成原告社会评价的降低，故被告依法应对原告承担停止侵犯名誉权、消除不良影响、赔偿维权合理损失的侵权责任。2022年7月26日，案件在北京市经一审审结：被告郑州骆马网络技术有限公司删除在“新浪微博”“三宫六院论坛”“腾讯QQ群”有关原告赵芮的侮辱性言论；被告郑州骆马网络技术有限公司赔偿原告赵芮精神损害抚慰金2000元，律师费2000元，共计4000元。&quot;},{&quot;id&quot;:141,&quot;caseName&quot;:&quot;刘某与李某名誉权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;北京市&quot;,&quot;date&quot;:&quot;2022-06-15&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;情绪宣泄与心理满足&quot;,&quot;method&quot;:&quot;人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;小红书&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;未明确&quot;,&quot;story&quot;:&quot;从小红书上的一则文字内容到法庭，“刘某与李某”案让当事人之间的冲突演变为名誉权纠纷。法院认定，李某在其手机小红书平台上对刘某以侮辱方式恶语回帖，侵害了刘某的名誉权。2022年6月15日，案件在北京市经一审审结：驳回被告李某的反诉请求。&quot;},{&quot;id&quot;:142,&quot;caseName&quot;:&quot;原告刘某某与被告彭某某、薛某某、吴某某名誉权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;江苏省南京市栖霞区人民法院&quot;,&quot;date&quot;:&quot;2020-12-22&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;情绪宣泄与心理满足&quot;,&quot;method&quot;:&quot;虚假新闻传播、人身攻击和侮辱、舆论操纵与煽动&quot;,&quot;format&quot;:&quot;文字、图片&quot;,&quot;platform&quot;:&quot;微信公众号、微信&quot;,&quot;visibility&quot;:&quot;半公开&quot;,&quot;relation&quot;:&quot;未明确&quot;,&quot;story&quot;:&quot;微信公众号、微信上的一组图文，把当事人之间的争议带进法庭。“原告刘某某与被告彭某某、薛某某、吴某某”案由此成为一起名誉权纠纷。法院认定，被告薛莉与原告刘文池系夫妻关系，双方之间产生婚姻家庭矛盾，被告薛莉应通过合法途径去解决，而不是将其与原告的家庭生活情况通过网络进行散布，其中部分言论具有明显的攻击性，侵犯原告的名誉，且即使属实也涉及原告的个人隐私，实属不当，对原告的人格尊严、社会评价均造成负面影响。2020年12月22日，案件在江苏省南京市栖霞区人民法院经一审审结。&quot;},{&quot;id&quot;:143,&quot;caseName&quot;:&quot;束东、许志祥与上海上青置业发展有限公司、苏冰名誉权纠纷二审民事判决书&quot;,&quot;province&quot;:&quot;上海市第二中级人民法院&quot;,&quot;date&quot;:&quot;2020-11-25&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;情绪宣泄与心理满足&quot;,&quot;method&quot;:&quot;虚假新闻传播、舆论操纵与煽动&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;微信&quot;,&quot;visibility&quot;:&quot;半公开&quot;,&quot;relation&quot;:&quot;企业与个人（非消费类）&quot;,&quot;story&quot;:&quot;一次发生在企业与个人（非消费类）之间的网络冲突，因微信上的一则文字内容进入司法程序，这就是“束东、许志祥与上海上青置业发展有限公司、苏冰”案。法院认定，侵害名誉权行为是指以书面、口头等形式宣扬他人的隐私，或者捏造事实公然丑化他人人格，以及用侮辱、诽谤等方式损害他人名誉，造成一定影响。2020年11月25日，案件在上海市第二中级人民法院经二审审结。&quot;},{&quot;id&quot;:144,&quot;caseName&quot;:&quot;原告王某与被告黄某名誉权、隐私权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;江苏省南京市栖霞区人民法院&quot;,&quot;date&quot;:&quot;2020-11-17&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;舆论操控与立场表达&quot;,&quot;method&quot;:&quot;隐私侵犯、虚假新闻传播、舆论操纵与煽动&quot;,&quot;format&quot;:&quot;文字、图片、视频&quot;,&quot;platform&quot;:&quot;微信&quot;,&quot;visibility&quot;:&quot;半公开&quot;,&quot;relation&quot;:&quot;未明确&quot;,&quot;story&quot;:&quot;从微信上的一组图文和视频到法庭，“原告王某与被告黄某名誉权、隐私权纠纷”案让当事人之间的冲突演变为名誉权纠纷。法院认定，在本案中，被告拍摄了原告家门口照片发布在了小区多个微信群内，同时指明了原告以及家庭成员的真实姓名，被告实施的公开原告家庭住址信息的行为侵犯了原告的隐私权。2020年11月17日，案件在江苏省南京市栖霞区人民法院经一审审结：此外，对于原告要求被告在东方天郡小区公示栏张贴书面道歉信的诉讼请求，本院亦不予支持。&quot;},{&quot;id&quot;:145,&quot;caseName&quot;:&quot;苏敏诉蒲君名誉权纠纷案&quot;,&quot;province&quot;:&quot;广东省惠州市大亚湾经济技术开发区人民法院&quot;,&quot;date&quot;:&quot;2020-10-21&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;情绪宣泄与心理满足&quot;,&quot;method&quot;:&quot;人身攻击和侮辱、隐私侵犯、舆论操纵与煽动&quot;,&quot;format&quot;:&quot;文字、图片&quot;,&quot;platform&quot;:&quot;微信&quot;,&quot;visibility&quot;:&quot;半公开&quot;,&quot;relation&quot;:&quot;邻里关系&quot;,&quot;story&quot;:&quot;微信上的一组图文，把邻里之间的争议带进法庭。“苏敏诉蒲君”案由此成为一起名誉权纠纷。法院认定，不特定关系人组成的微信群具有公共空间属性，公民在此类微信群中发布侮辱、诽谤、污蔑或者贬损他人的言论构成名誉权侵权，应当依法承担法律责任。2020年10月21日，案件在广东省惠州市大亚湾经济技术开发区人民法院经一审审结：关于原告名誉权被侵犯产生的精神损害抚慰金，原告提供的证据尚不能证明其经济损失，原告要求支付精神损害抚慰金的诉讼请求，本院不予支持。&quot;},{&quot;id&quot;:146,&quot;caseName&quot;:&quot;张某徐某名誉权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;江西省鹰潭市月湖区人民法院&quot;,&quot;date&quot;:&quot;2020-09-11&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;个人/群体恩怨报复&quot;,&quot;method&quot;:&quot;人身攻击和侮辱、隐私侵犯&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;微博&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;一次发生在陌生人之间的网络冲突，因微博上的一则文字内容进入司法程序，这就是“张某徐某”案。法院认定，被告作为“阿雨昕徐\&quot;新浪微博用户的实际使用者，在新浪微博平台上未经原告同意，擅自公布其打胎的事实，且直接将原告的姓名等信息公布，公开发表对原告人身攻击和侮辱的言辞，主观上对原告的名誉进行贬损，客观上造成原告名誉权损害，被告应对原告承担相应的民事侵权责任。2020年9月11日，案件在江西省鹰潭市月湖区人民法院经一审审结：原告主张误工费，但未提供证据证明，对该诉讼请求不予支持。&quot;},{&quot;id&quot;:147,&quot;caseName&quot;:&quot;刘某某诉于某某1等名誉权纠纷一案-民事判决书&quot;,&quot;province&quot;:&quot;吉林省长春市朝阳区人民法院&quot;,&quot;date&quot;:&quot;2020-08-31&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;个人/群体恩怨报复&quot;,&quot;method&quot;:&quot;虚假新闻传播、人身攻击和侮辱、舆论操纵与煽动&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;微博、知乎&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;熟人关系&quot;,&quot;story&quot;:&quot;从微博、知乎上的一则文字内容到法庭，“刘某某诉于某某1等一案-”案让熟人之间的冲突演变为名誉权纠纷。法院认定，关于于某某1是否有侵害刘某某名誉权的行为，于某某1在微博和知乎上发布的内容不属于新闻报道，其发布的刘某某个人信息均为刘某某在网上公开的信息，于某某1陈述的其与刘某某交往过程中的发生的情况也不属于刘某某的个人隐私。2020年8月31日，案件在吉林省长春市朝阳区人民法院经一审审结。&quot;},{&quot;id&quot;:148,&quot;caseName&quot;:&quot;逯某与闫某某人格权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;北京市东城区人民法院&quot;,&quot;date&quot;:&quot;2020-08-20&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;人格权纠纷&quot;,&quot;purpose&quot;:&quot;个人/群体恩怨报复&quot;,&quot;method&quot;:&quot;人身攻击和侮辱、隐私侵犯&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;百度贴吧&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;熟人关系&quot;,&quot;story&quot;:&quot;百度贴吧上的一则文字内容，把熟人之间的争议带进法庭。“逯某与闫某某”案由此成为一起人格权纠纷。法院认定，当事人对自己提出的诉讼请求所依据的事实有责任提供证据加以证明，没有证据或证据不足以证明当事人的事实主张的，由负有举证责任的当事人承担不利后果。2020年8月20日，案件在北京市东城区人民法院经一审审结：原告主张因侵犯其贞操权、名誉权以及引产造成的身体权、健康权被侵害产生的精神损害抚慰金的诉讼请求，依据不足，本院不予支持。&quot;},{&quot;id&quot;:149,&quot;caseName&quot;:&quot;郭艺楠与裴某、罗某名誉权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;安徽省马鞍山市花山区人民法院&quot;,&quot;date&quot;:&quot;2020-06-16&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;经济利益诉求&quot;,&quot;method&quot;:&quot;虚假新闻传播、人身攻击和侮辱、隐私侵犯、舆论操纵与煽动&quot;,&quot;format&quot;:&quot;文字、视频&quot;,&quot;platform&quot;:&quot;微博&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;消费者与商家&quot;,&quot;story&quot;:&quot;一次发生在消费者与商家之间的网络冲突，因微博上的一组图文和视频进入司法程序，这就是“郭艺楠与裴某、罗某”案。法院认定，公民人格尊严受法律保护，禁止用侮辱诽谤等方式损害公民的名誉。2020年6月16日，案件在安徽省马鞍山市花山区人民法院经一审审结：郭艺楠主张的消除影响、停止侵害、赔礼道歉的诉请，因裴鑫、罗凤皇已经以实际行动表明其对郭艺楠停止侵害、消除影响，并进行了赔礼道歉，故对郭艺楠的该项诉讼请求，本院不予支持。&quot;},{&quot;id&quot;:150,&quot;caseName&quot;:&quot;杨某唐梦缘名誉权纠纷一案民事一审判决书&quot;,&quot;province&quot;:&quot;广东省佛山市禅城区人民法院&quot;,&quot;date&quot;:&quot;2020-05-06&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;个人/群体恩怨报复&quot;,&quot;method&quot;:&quot;人身攻击和侮辱、隐私侵犯&quot;,&quot;format&quot;:&quot;文字、图片、视频&quot;,&quot;platform&quot;:&quot;美拍、微信、微博&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;从美拍、微信、微博上的一组图文和视频到法庭，“杨某唐梦缘一案民事判决书”案让陌生人之间的冲突演变为名誉权纠纷。法院认定，二、若被告的行为构成侵权，被告应如何承担侵权责任。2020年5月6日，案件在广东省佛山市禅城区人民法院经一审审结。&quot;},{&quot;id&quot;:151,&quot;caseName&quot;:&quot;仇某某、张某某1名誉权纠纷二审民事判决书&quot;,&quot;province&quot;:&quot;浙江省杭州市中级人民法院&quot;,&quot;date&quot;:&quot;2020-04-28&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;舆论操控与立场表达&quot;,&quot;method&quot;:&quot;人身攻击和侮辱、舆论操纵与煽动&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;微博&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;微博上的一则文字内容，把陌生人之间的争议带进法庭。“仇某某、张某某1”案由此成为一起名誉权纠纷。法院认定，上诉人仇某某辩称“蜡笔小球\&quot;账号虽系其注册，但借给他人使用，对案涉言论不 在侮辱和诽谤的内容，即便按照更高的注意义务标准来判断，其发布的涉案博文仍然不构成侵权。2019年6月18日，案件在北京互联网法院经一审审结。&quot;},{&quot;id&quot;:155,&quot;caseName&quot;:&quot;简某与黄某、陈某名誉权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;广东省潮州市湘桥区人民法院&quot;,&quot;date&quot;:&quot;2018-08-30&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;情绪宣泄与心理满足&quot;,&quot;method&quot;:&quot;人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;微信&quot;,&quot;visibility&quot;:&quot;半公开&quot;,&quot;relation&quot;:&quot;邻里关系&quot;,&quot;story&quot;:&quot;一次发生在邻里之间的网络冲突，因微信上的一则文字内容进入司法程序，这就是“简某与黄某、陈某”案。法院认定，后简攀、黄树豪、陈少珊、王锐英在微信聊天中对上述停车、起诉、应诉的问题进行讨论，不足以造成简攀、陈少珊的名誉受损害、社会评价降低的后果。2018年8月30日，案件在广东省潮州市湘桥区人民法院经一审审结：在作出判决前，当事人未能提供证据或者证据不足以证明其事实主张的，由负有举证证明责任的当事人承担不利的后果\&quot;的规定，简攀的诉讼请求、陈少珊的反诉请求，均缺乏证据，本院依法不予支持，应予驳回。&quot;},{&quot;id&quot;:156,&quot;caseName&quot;:&quot;陈某诉中青网络科技（北京）有限公司名誉权纠纷案&quot;,&quot;province&quot;:&quot;湖北省来凤县人民法院&quot;,&quot;date&quot;:&quot;2018-04-11&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;流量与关注度追逐&quot;,&quot;method&quot;:&quot;虚假新闻传播&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;中国青年网&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;从中国青年网上的一则文字内容到法庭，“陈某诉中青网络科技（北京）有限公司”案让陌生人之间的冲突演变为名誉权纠纷。法院认定，原告虽然提供了被告运营网站即中国青年网发表的该篇报道及后续的转载新闻，但从该报道的内容中既不能证明中国青年网是针对原告本人，同时也不能证明中国青年网的报道是否对原告构成侮辱、诽谤以及名誉贬损的事实。2018年4月11日，案件在湖北省来凤县人民法院经一审审结：原告虽然提供了被告运营网站即中国青年网发表的该篇报道及后续的转载新闻，但从该报道的内容中既不能证明中国青年网是针对原告本人，同时也不能证明中国青年网的报道是否对原告构成侮辱、诽谤以及名誉贬损的事实。&quot;},{&quot;id&quot;:157,&quot;caseName&quot;:&quot;黄某某2与黄某某3等一审民事判决书&quot;,&quot;province&quot;:&quot;北京市海淀区人民法院&quot;,&quot;date&quot;:&quot;2017-03-20&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;个人/群体恩怨报复&quot;,&quot;method&quot;:&quot;虚假新闻传播、人身攻击和侮辱、隐私侵犯&quot;,&quot;format&quot;:&quot;文字、图片&quot;,&quot;platform&quot;:&quot;微博&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;熟人关系&quot;,&quot;story&quot;:&quot;微博上的一组图文，把熟人之间的争议带进法庭。“黄某某2与黄某某3等”案由此成为一起名誉权纠纷。法院认定，就前述指控侵犯黄奕名誉权的内容而言，黄毅清在前述部分涉案微博中公开传播黄奕婚内与他人有不正当关系、“挣抬腿钱”、“性生活过度糜烂”、“在香港得性病”、“性病妇科病缠身”、开皮包公司欺骗他人等情事，这些情事对黄奕的个人品行具有明显的诽谤意义，一旦不实传播足以造成黄奕的社会评价降低。2017年3月20日，案件在北京市海淀区人民法院经一审审结。&quot;},{&quot;id&quot;:158,&quot;caseName&quot;:&quot;曾苗兴诉广州市盈晟餐饮服务有限公司合同纠纷案&quot;,&quot;province&quot;:&quot;福建省莆田市秀屿区人民法院&quot;,&quot;date&quot;:&quot;2017-02-27&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;合同、准合同纠纷合同纠纷&quot;,&quot;purpose&quot;:&quot;经济利益诉求&quot;,&quot;method&quot;:&quot;虚假新闻传播&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;网络发帖&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;消费者与商家&quot;,&quot;story&quot;:&quot;一次发生在消费者与商家之间的网络冲突，因网络发帖上的一则文字内容进入司法程序，这就是“曾苗兴诉广州市盈晟餐饮服务有限公司合同纠纷”案。法院认定，盈晟餐饮公司主张曾苗兴在网络上发帖文，通过捏造事实的手段诋毁其公司的声誉，与本案不具有关联性，盈晟餐饮公司可另行主张权利。2017年2月27日，案件在福建省莆田市秀屿区人民法院经一审审结。&quot;},{&quot;id&quot;:159,&quot;caseName&quot;:&quot;代娜与毛德田名誉权纠纷案&quot;,&quot;province&quot;:&quot;上海市浦东新区人民法院&quot;,&quot;date&quot;:&quot;2016-01-21&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;情绪宣泄与心理满足&quot;,&quot;method&quot;:&quot;人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;天涯论坛&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;从天涯论坛上的一则文字内容到法庭，“代娜与毛德田”案让陌生人之间的冲突演变为名誉权纠纷。法院认定，被告在没有事实依据的情况下，在原告所发主帖中宣称原告精神有问题，并使用带有贬义的形容词语辱骂原告，故本院依法认定被告的上述行为侵犯了原告的合法权益，在一定程度上损害了原告的名誉，降低了原告的社会评价。2016年1月21日，案件在上海市浦东新区人民法院经一审审结。&quot;},{&quot;id&quot;:160,&quot;caseName&quot;:&quot;甄子丹诉耿某某1（另名檀冰）名誉权纠纷案&quot;,&quot;province&quot;:&quot;北京市海淀区人民法院&quot;,&quot;date&quot;:&quot;2015-11-17&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;个人/群体恩怨报复&quot;,&quot;method&quot;:&quot;虚假新闻传播、人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;新闻发布会、乐视网&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;同事/同业关系&quot;,&quot;story&quot;:&quot;新闻发布会、乐视网上的一则文字内容，把同事或同业之间的争议带进法庭。“甄子丹诉耿某某1（另名檀冰）”案由此成为一起名誉权纠纷。法院认定，另外，其在与甄子丹并无任何法律关系时单方指责甄子丹“罢演”、“违约”，在甄子丹通过媒体澄清事实后仍继续针对甄子丹就同一事件继续发表不当言论，置他人于无法辩驳之境而混淆视听，具有“泄私愤”的嫌疑，应认定其主观上具有损害甄子丹名誉权的愿望，并希望扩大不良影响，其言行显然具有故意的主观过错。2015年11月17日，案件在北京市海淀区人民法院经一审审结。&quot;},{&quot;id&quot;:161,&quot;caseName&quot;:&quot;孟某与刘某名誉权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;云南省昆明市盘龙区人民法院&quot;,&quot;date&quot;:&quot;2015-06-15&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;个人/群体恩怨报复&quot;,&quot;method&quot;:&quot;人身攻击和侮辱、舆论操纵与煽动&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;新浪微博、微信&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;熟人关系&quot;,&quot;story&quot;:&quot;一次发生在熟人之间的网络冲突，因新浪微博、微信上的一则文字内容进入司法程序，这就是“孟某与刘某”案。法院认定，况且原、被告本为朋友，两人又在同一行业工作，被告的行为更容易造成此事在原告的人际范围内广泛传播，被告的不当言行必然造成较大范围内的人们对原告的评价降低，使原告的名誉受损，其主观上明显具有对原告名誉权进行毁损的故意，客观上实施了违法行为，已构成对原告的名誉权的侵犯，应当承担侵权的民事责任。2015年6月15日，案件在云南省昆明市盘龙区人民法院经一审审结。&quot;},{&quot;id&quot;:162,&quot;caseName&quot;:&quot;尹航诉周莹莹名誉权纠纷案&quot;,&quot;province&quot;:&quot;北京市大兴区（县）人民法院&quot;,&quot;date&quot;:&quot;2014-10-28&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;个人/群体恩怨报复&quot;,&quot;method&quot;:&quot;人身攻击和侮辱、威胁与恐吓&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;人人网、QQ空间&quot;,&quot;visibility&quot;:&quot;半公开&quot;,&quot;relation&quot;:&quot;同学关系&quot;,&quot;story&quot;:&quot;从人人网、QQ空间上的一则文字内容到法庭，“尹航诉周莹莹”案让同学之间的冲突演变为名誉权纠纷。法院认定，周莹莹在人人网、QQ空间中对尹航进行辱骂，其主观上有过错，导致尹航在日常生活中的社会评价降低，对尹航的名誉造成不良影响，侵犯了尹航的名誉权，应承担相应的民事责任。2014年10月28日，案件在北京市大兴区（县）人民法院经一审审结。&quot;},{&quot;id&quot;:163,&quot;caseName&quot;:&quot;刘某与北京车之家信息技术有限公司名誉权纠纷案&quot;,&quot;province&quot;:&quot;北京市第三中级人民法院&quot;,&quot;date&quot;:&quot;2014-10-17&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;舆论操控与立场表达&quot;,&quot;method&quot;:&quot;人身攻击和侮辱、舆论操纵与煽动&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;汽车之家网站&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;汽车之家网站上的一则文字内容，把陌生人之间的争议带进法庭。“刘某与北京车之家信息技术有限公司”案由此成为一起名誉权纠纷。法院认定，车之家公司作为网站论坛的经营者，应承担相应的管理义务，如选择版主、管理员，对发言内容进行甄别、分类和相应处理等。2014年10月17日，案件在北京市第三中级人民法院经二审审结：判决后，上诉至本院。刘某认为：原审法院认定车之家公司时隔三天删除侵权帖子属认定事实错误；第七项，判令：车之家公司赔偿刘某误工费8400元、医疗费1124.86元、交通费450元。&quot;},{&quot;id&quot;:164,&quot;caseName&quot;:&quot;刘某诉北京车之家信息技术有限公司名誉权纠纷案&quot;,&quot;province&quot;:&quot;北京市朝阳区人民法院&quot;,&quot;date&quot;:&quot;2014-06-18&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;舆论操控与立场表达&quot;,&quot;method&quot;:&quot;人身攻击和侮辱、舆论操纵与煽动&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;汽车之家网站&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;一次发生在陌生人之间的网络冲突，因汽车之家网站上的一则文字内容进入司法程序，这就是“刘某诉北京车之家信息技术有限公司”案。法院认定，汽车之家网站论坛中的宝马3系论坛，注册人数超过60万人，网络用户数量庞大。2014年6月18日，案件在北京市朝阳区人民法院经一审审结。&quot;},{&quot;id&quot;:165,&quot;caseName&quot;:&quot;刘某2侮辱、诽谤一审刑事判决书&quot;,&quot;province&quot;:&quot;云南省昆明市盘龙区人民法院&quot;,&quot;date&quot;:&quot;2013-11-28&quot;,&quot;caseType&quot;:&quot;刑事&quot;,&quot;cause&quot;:&quot;诽谤罪&quot;,&quot;purpose&quot;:&quot;个人/群体恩怨报复&quot;,&quot;method&quot;:&quot;人身攻击和侮辱、隐私侵犯&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;新浪微博、微信&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;熟人关系&quot;,&quot;story&quot;:&quot;从新浪微博、微信上的一则文字内容到法庭，“刘某2侮辱、诽谤”案让熟人之间的冲突演变为诽谤罪。法院认定，在庭审中，经查看双方当事人的手机，被告人刘灵犀的微博中已删除与本案有关的所有内容，在双方的手机中均发现有辱骂对方的言词，综上，被告人刘灵犀用侮辱性语言谩骂自诉人的行为，不符合情节严重的情形，对要求追究被告人刘灵犀侮辱罪刑事责任的诉求，本院不予支持。2013年11月28日，案件在云南省昆明市盘龙区人民法院经一审审结。&quot;},{&quot;id&quot;:166,&quot;caseName&quot;:&quot;原告邱姣娇与被告南京市琅琊路小学分校天润城小学人事争议纠纷案&quot;,&quot;province&quot;:&quot;江苏省南京市浦口区人民法院&quot;,&quot;date&quot;:&quot;2013-10-16&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;劳动争议&quot;,&quot;purpose&quot;:&quot;个人/群体恩怨报复&quot;,&quot;method&quot;:&quot;人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;网络发帖&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;网络发帖上的一则文字内容，把陌生人之间的争议带进法庭。“原告邱姣娇与被告南京市琅琊路小学分校天润城小学人事争议纠纷”案由此成为一起劳动争议。法院认定，原告邱姣娇在《关于对季某某等孩子体罚过程经过》中，承认有“打”、“踢”学生的行为，经教育做出检讨之后，学生家长再次向被告反映，原告在教育教学过程中，存在要求学生自己打自己嘴巴的行为，并且经原告所在班级的学生予以证实。2013年10月16日，案件在江苏省南京市浦口区人民法院经一审审结。&quot;},{&quot;id&quot;:167,&quot;caseName&quot;:&quot;王某诉海南天涯在线网络科技有限公司名誉权、隐私权纠纷案&quot;,&quot;province&quot;:&quot;北京市朝阳区人民法院&quot;,&quot;date&quot;:&quot;2008-12-18&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;舆论操控与立场表达&quot;,&quot;method&quot;:&quot;人身攻击和侮辱、隐私侵犯&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;天涯网&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;一次发生在陌生人之间的网络冲突，因天涯网上的一则文字内容进入司法程序，这就是“王某诉海南天涯在线网络科技有限公司名誉权、隐私权纠纷”案。法院认定，鉴于互联网具有的广泛、迅速、即时、随意、互动等传播特点，天涯公司的这种事后删除行为符合相关规定，不构成侵权。2008年12月18日，案件在北京市朝阳区人民法院经一审审结。&quot;},{&quot;id&quot;:168,&quot;caseName&quot;:&quot;陆某与陆某、东莞市常平八达塑胶原料经营部名誉权纠纷一案民事二审判决书&quot;,&quot;province&quot;:&quot;广东省东莞市中级人民法院&quot;,&quot;date&quot;:&quot;2020-12-29&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;情绪宣泄与心理满足&quot;,&quot;method&quot;:&quot;人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;微信&quot;,&quot;visibility&quot;:&quot;半公开&quot;,&quot;relation&quot;:&quot;消费者与商家&quot;,&quot;story&quot;:&quot;从微信上的一则文字内容到法庭，“陆某与陆某、东莞市常平八达塑胶原料经营部一案民事判决书”案让消费者与商家之间的冲突演变为名誉权纠纷。法院认定，本院认为，陈虹在其微信账号的朋友圈所发信息侵犯了陆战东的名誉权，在客观上产生了一定的损害后果，陈虹应当承担相应的侵权责任。2020年12月29日，案件在广东省东莞市中级人民法院经二审审结：至于八达经营部的责任，虽然八达经营部由陈虹经营，但陈虹在其微信账号的朋友圈发信息的行为并不能等同于八达经营部的行为，故本院对陆战东诉请八达经营部承担责任的诉讼请求不予支持。&quot;},{&quot;id&quot;:169,&quot;caseName&quot;:&quot;杨某与北京菠萝互动科技有限公司网络侵权责任纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;甘肃省兰州市七里河区人民法院&quot;,&quot;date&quot;:&quot;2020-12-25&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;网络侵权责任纠纷&quot;,&quot;purpose&quot;:&quot;流量与关注度追逐&quot;,&quot;method&quot;:&quot;人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;网络文章&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;网络文章上的一则文字内容，把陌生人之间的争议带进法庭。“杨某与北京菠萝互动科技有限公司”案由此成为一起网络侵权责任纠纷。法院认定，公民及法人组织在网络上发布观点及评论,是其言论自由的范畴,但言论自由并非没有限度,一旦言论超出了必要的界限,则有可能构成侵权。2020年12月25日，案件在甘肃省兰州市七里河区人民法院经一审审结：对于杨媛莉的诉讼请求，本院不予支持。&quot;},{&quot;id&quot;:170,&quot;caseName&quot;:&quot;黄某某与廖某某名誉权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;四川省绵阳市游仙区人民法院&quot;,&quot;date&quot;:&quot;2020-09-07&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;个人/群体恩怨报复&quot;,&quot;method&quot;:&quot;人身攻击和侮辱、舆论操纵与煽动&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;新浪微博&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;消费者与商家&quot;,&quot;story&quot;:&quot;一次发生在消费者与商家之间的网络冲突，因新浪微博上的一则文字内容进入司法程序，这就是“黄某某与廖某某”案。法院认定，新浪微博账号“大即是正义Gasp”为廖志强所用，根据所有证据，廖志强曾经发布的多条微博里使用“墩子”、“坦克”、“装逼”等粗俗的语言对黄沁懿进行侮辱，且浏览量达到20余万次，应认定达到足以降低原告社会评价的程度，该行为构成对黄沁懿名誉权的侵害，因此廖志强应当承担相应的侵权责任。2020年9月7日，案件在四川省绵阳市游仙区人民法院经一审审结：关于黄沁懿诉请廖志强停止侵害的诉讼请求，经核实，廖志强已删除相关微博，故该诉请本院不予支持。&quot;},{&quot;id&quot;:171,&quot;caseName&quot;:&quot;张某与张帅等名誉权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;北京市海淀区人民法院&quot;,&quot;date&quot;:&quot;2020-04-09&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;情绪宣泄与心理满足&quot;,&quot;method&quot;:&quot;人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;微博&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;从微博上的一则文字内容到法庭，“张某与张帅等”案让陌生人之间的冲突演变为名誉权纠纷。法院认定，被告的言论侵害了原告的名誉权，且侵权恶意明显，势必给张杰造成严重的精神损害，故本院对张杰主张的精神损害抚慰金请求酌情予以支持。2020年4月9日，案件在北京市海淀区人民法院经一审审结。&quot;},{&quot;id&quot;:172,&quot;caseName&quot;:&quot;王某3、李某2、杭州市西湖区人民政府等行政复议二审行政判决书&quot;,&quot;province&quot;:&quot;浙江省高级人民法院&quot;,&quot;date&quot;:&quot;2019-07-26&quot;,&quot;caseType&quot;:&quot;行政&quot;,&quot;cause&quot;:&quot;行政复议&quot;,&quot;purpose&quot;:&quot;个人/群体恩怨报复&quot;,&quot;method&quot;:&quot;隐私侵犯&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;微信&quot;,&quot;visibility&quot;:&quot;半公开&quot;,&quot;relation&quot;:&quot;邻里关系&quot;,&quot;story&quot;:&quot;微信上的一则文字内容，把邻里之间的争议带进法庭。“王某3、李某2、杭州市西湖区人民政府等行政复议”案由此成为一起行政复议。法院认定，上诉人王笑、李群及被上诉人朱利华均系杭州西溪诚园业主，朱利华之妻王筱敏因其夫妇与两上诉人之间的纠纷在西溪诚园业主微信群中发布了“一件发生在明礼苑的恶性事件\&quot;的文章，从自己的角度描述了事情经过，表达了看法，并公开了上诉人王笑、李群的姓名和家庭具体住址，朱利华又将该文章转发到另三个西溪诚园业主微信群中。2019年7月26日，案件在浙江省高级人民法院经二审审结。&quot;},{&quot;id&quot;:173,&quot;caseName&quot;:&quot;胡某、南京汇法正信信息科技有限公司一般人格权纠纷二审民事判决书&quot;,&quot;province&quot;:&quot;浙江省宁波市中级人民法院&quot;,&quot;date&quot;:&quot;2019-06-27&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;人格权纠纷&quot;,&quot;purpose&quot;:&quot;经济利益诉求&quot;,&quot;method&quot;:&quot;隐私侵犯&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;催天下网站&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;消费者与商家&quot;,&quot;story&quot;:&quot;一次发生在消费者与商家之间的网络冲突，因催天下网站上的一则文字内容进入司法程序，这就是“胡某、南京汇法正信信息科技有限公司一般”案。法院认定，但经查，二被上诉人在催天下网站发布的律师函仅表述上诉人未交纳物业费的事实，并未作其他评价性描述，催天下网站也未披露上诉人的其他个人信息，第三方无法据此信息明确指向上诉人，不构成对上诉人隐私权的侵犯。2019年6月27日，案件在浙江省宁波市中级人民法院经二审审结：胡某的上诉请求不能成立，应予驳回。&quot;},{&quot;id&quot;:174,&quot;caseName&quot;:&quot;杨某与陈某网络侵权责任纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;浙江省上虞区（市）人民法院&quot;,&quot;date&quot;:&quot;2019-05-24&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;网络侵权责任纠纷&quot;,&quot;purpose&quot;:&quot;个人/群体恩怨报复&quot;,&quot;method&quot;:&quot;人身攻击和侮辱、隐私侵犯&quot;,&quot;format&quot;:&quot;文字、图片&quot;,&quot;platform&quot;:&quot;108社区、本地头条&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;邻里关系&quot;,&quot;story&quot;:&quot;从108社区、本地头条上的一组图文到法庭，“杨某与陈某”案让邻里之间的冲突演变为网络侵权责任纠纷。法院认定，“打人者老婆（盖北闰土染布厂做化验员的羊大艳）\&quot;、“打人者老婆在盖北化工园区浙江闰土染布厂做化验员小组长的贵州人杨大燕\&quot;等信息直指原告，并通过“@狼来了MM311\&quot;回复不当言论，该行为已对原告构成侵权。2019年5月24日，案件在浙江省上虞区（市）人民法院经一审审结。&quot;},{&quot;id&quot;:175,&quot;caseName&quot;:&quot;SUN,ZANDONG与北京智者天下科技有限公司网络侵权责任纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;北京市海淀区人民法院&quot;,&quot;date&quot;:&quot;2018-10-29&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;网络侵权责任纠纷&quot;,&quot;purpose&quot;:&quot;个人/群体恩怨报复&quot;,&quot;method&quot;:&quot;人身攻击和侮辱&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;知乎网&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;知乎网上的一则文字内容，把陌生人之间的争议带进法庭。“SUN,ZANDONG与北京智者天下科技有限公司”案由此成为一起网络侵权责任纠纷。法院认定，鉴此，被告并未利用信息网络直接发布侵权信息侵害孙赞东名誉权，相关网络用户为侵害原告名誉权的直接侵权主体。2018年10月29日，案件在北京市海淀区人民法院经一审审结。&quot;},{&quot;id&quot;:176,&quot;caseName&quot;:&quot;陈某与张某、无锡市公安局滨湖分局等行政复议二审行政判决书&quot;,&quot;province&quot;:&quot;江苏省无锡市中级人民法院&quot;,&quot;date&quot;:&quot;2018-08-30&quot;,&quot;caseType&quot;:&quot;行政&quot;,&quot;cause&quot;:&quot;行政主体其他（公安）&quot;,&quot;purpose&quot;:&quot;个人/群体恩怨报复&quot;,&quot;method&quot;:&quot;隐私侵犯&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;微博、QQ群&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;一次发生在陌生人之间的网络冲突，因微博、QQ群上的一则文字内容进入司法程序，这就是“陈某与张某、无锡市公安局滨湖分局等行政复议”案。法院认定，上诉人在微博和微博群散布被上诉人的姓名、婚姻状况等个人信息，构成散布他人隐私。2018年8月30日，案件在江苏省无锡市中级人民法院经二审审结。&quot;},{&quot;id&quot;:177,&quot;caseName&quot;:&quot;陈某与厦门名誉权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;湖北省来凤县人民法院&quot;,&quot;date&quot;:&quot;2018-06-12&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;流量与关注度追逐&quot;,&quot;method&quot;:&quot;虚假新闻传播&quot;,&quot;format&quot;:&quot;文字&quot;,&quot;platform&quot;:&quot;男人窝网&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;陌生人关系&quot;,&quot;story&quot;:&quot;从男人窝网上的一则文字内容到法庭，“陈某与厦门”案让陌生人之间的冲突演变为名誉权纠纷。法院认定，原告虽然提供了被告运营网站即“男人窝\&quot;网发表的该篇报道及后续的转载新闻，但从该报道的内容中既不能证明“男人窝\&quot;网是针对原告本人，同时也不能证明“男人窝\&quot;网的报道是否对原告构成侮辱、诽谤以及名誉贬损的事实。2018年6月12日，案件在湖北省来凤县人民法院经一审审结：原告虽然提供了被告运营网站即“男人窝\&quot;网发表的该篇报道及后续的转载新闻，但从该报道的内容中既不能证明“男人窝\&quot;网是针对原告本人，同时也不能证明“男人窝\&quot;网的报道是否对原告构成侮辱、诽谤以及名誉贬损的事实。&quot;},{&quot;id&quot;:178,&quot;caseName&quot;:&quot;汪某王某名誉权纠纷一审民事判决书&quot;,&quot;province&quot;:&quot;江苏省南通市崇川区人民法院&quot;,&quot;date&quot;:&quot;2018-04-17&quot;,&quot;caseType&quot;:&quot;民事&quot;,&quot;cause&quot;:&quot;名誉权纠纷&quot;,&quot;purpose&quot;:&quot;经济利益诉求&quot;,&quot;method&quot;:&quot;隐私侵犯、舆论操纵与煽动&quot;,&quot;format&quot;:&quot;文字、图片&quot;,&quot;platform&quot;:&quot;微博&quot;,&quot;visibility&quot;:&quot;公开&quot;,&quot;relation&quot;:&quot;消费者与商家&quot;,&quot;story&quot;:&quot;微博上的一组图文，把消费者与商家之间的争议带进法庭。“汪某王某”案由此成为一起名誉权纠纷。法院认定，王钦琪就其与汪戎发生的争议在微博所发布的《关于前几天微博纠纷的一些说明》的相关内容基本属实，未使用偏激和侮辱他人的语言，不构成对汪戎名誉权的侵害。2018年4月17日，案件在江苏省南通市崇川区人民法院经一审审结：汪戎的诉讼请求，本院难以支持。&quot;}];
  const grid = root.querySelector(&quot;#law-case-grid&quot;);
  const popover = root.querySelector(&quot;#law-case-popover&quot;);
  const summaryCount = root.querySelector(&quot;#law-summary-count&quot;);
  const summaryTitle = root.querySelector(&quot;#law-summary-title&quot;);
  const summaryMeta = root.querySelector(&quot;#law-summary-meta&quot;);
  const fields = {
    index: root.querySelector(&quot;#law-popover-index&quot;),
    title: root.querySelector(&quot;#law-popover-title&quot;),
    date: root.querySelector(&quot;#law-meta-date&quot;),
    province: root.querySelector(&quot;#law-meta-province&quot;),
    type: root.querySelector(&quot;#law-meta-type&quot;),
    cause: root.querySelector(&quot;#law-meta-cause&quot;),
    platform: root.querySelector(&quot;#law-meta-platform&quot;),
    visibility: root.querySelector(&quot;#law-meta-visibility&quot;),
    relation: root.querySelector(&quot;#law-meta-relation&quot;),
    format: root.querySelector(&quot;#law-meta-format&quot;),
    story: root.querySelector(&quot;#law-popover-story&quot;),
  };

  let pinnedId = null;
  let activeButton = null;
  const buttons = new Map();
  const byId = new Map(caseData.map((item) =&gt; [item.id, item]));

  function caseIndex(item) {
    return `第${String(item.id).padStart(3, &quot;0&quot;)}案`;
  }

  function updateSummary(item) {
    if (!item) {
      summaryCount.textContent = `共 ${caseData.length} 案`;
      summaryTitle.textContent = &quot;按案件编号排列&quot;;
      summaryMeta.textContent = &quot;悬停、聚焦或点击条款查看详情&quot;;
      return;
    }
    summaryCount.textContent = caseIndex(item);
    summaryTitle.textContent = item.caseName;
    summaryMeta.textContent = `${item.date} · ${item.province} · ${item.platform}`;
  }

  function populatePopover(item) {
    fields.index.textContent = caseIndex(item);
    fields.title.textContent = item.caseName;
    fields.date.textContent = item.date;
    fields.province.textContent = item.province;
    fields.type.textContent = item.caseType;
    fields.cause.textContent = item.cause;
    fields.platform.textContent = item.platform;
    fields.visibility.textContent = item.visibility;
    fields.relation.textContent = item.relation;
    fields.format.textContent = item.format;
    fields.story.textContent = item.story;
  }

  function positionPopover(button) {
    const rootRect = root.getBoundingClientRect();
    const buttonRect = button.getBoundingClientRect();
    const popoverRect = popover.getBoundingClientRect();
    const inset = 8;
    const gutter = 10;
    const maxX = Math.max(inset, root.clientWidth - popoverRect.width - inset);
    let left = buttonRect.right - rootRect.left + gutter;
    if (left + popoverRect.width &gt; root.clientWidth - inset) {
      left = buttonRect.left - rootRect.left - popoverRect.width - gutter;
    }
    left = Math.max(inset, Math.min(maxX, left));

    const desiredTop = buttonRect.top - rootRect.top + buttonRect.height / 2 - popoverRect.height / 2;
    const maxY = Math.max(inset, root.scrollHeight - popoverRect.height - inset);
    const top = Math.max(inset, Math.min(maxY, desiredTop));
    popover.style.left = `${left}px`;
    popover.style.top = `${top}px`;
  }

  function show(item, button) {
    activeButton = button;
    populatePopover(item);
    updateSummary(item);
    popover.hidden = false;
    requestAnimationFrame(() =&gt; positionPopover(button));
  }

  function restorePinnedOrHide() {
    if (pinnedId != null) {
      const item = byId.get(pinnedId);
      const button = buttons.get(pinnedId);
      if (item &amp;&amp; button) show(item, button);
      return;
    }
    activeButton = null;
    popover.hidden = true;
    updateSummary(null);
  }

  function setPinned(item, button) {
    for (const tile of buttons.values()) tile.setAttribute(&quot;aria-pressed&quot;, &quot;false&quot;);
    if (pinnedId === item.id) {
      pinnedId = null;
      restorePinnedOrHide();
      return;
    }
    pinnedId = item.id;
    button.setAttribute(&quot;aria-pressed&quot;, &quot;true&quot;);
    show(item, button);
  }

  const fragment = document.createDocumentFragment();
  for (const item of caseData) {
    const button = document.createElement(&quot;button&quot;);
    button.type = &quot;button&quot;;
    button.className = &quot;btn viz-tile case-tile text-small&quot;;
    button.textContent = String(item.id).padStart(3, &quot;0&quot;);
    button.setAttribute(&quot;aria-pressed&quot;, &quot;false&quot;);
    button.setAttribute(&quot;aria-label&quot;, `${caseIndex(item)}：${item.caseName}。悬停、聚焦或点击查看详情。`);
    button.addEventListener(&quot;pointerenter&quot;, () =&gt; show(item, button));
    button.addEventListener(&quot;pointerleave&quot;, restorePinnedOrHide);
    button.addEventListener(&quot;mouseenter&quot;, () =&gt; show(item, button));
    button.addEventListener(&quot;mouseleave&quot;, restorePinnedOrHide);
    button.addEventListener(&quot;focus&quot;, () =&gt; show(item, button));
    button.addEventListener(&quot;blur&quot;, restorePinnedOrHide);
    button.addEventListener(&quot;click&quot;, () =&gt; setPinned(item, button));
    buttons.set(item.id, button);
    fragment.appendChild(button);
  }
  grid.appendChild(fragment);

  root.addEventListener(&quot;keydown&quot;, (event) =&gt; {
    if (event.key !== &quot;Escape&quot;) return;
    pinnedId = null;
    for (const tile of buttons.values()) tile.setAttribute(&quot;aria-pressed&quot;, &quot;false&quot;);
    restorePinnedOrHide();
  });

  window.addEventListener(&quot;resize&quot;, () =&gt; {
    if (activeButton &amp;&amp; !popover.hidden) positionPopover(activeButton);
  });
})();
&lt;/script&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;

&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
